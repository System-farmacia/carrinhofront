<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <section>
<div class="conteiner">
    <h1 class="titulo-principal">Meu Carrinho</h1>
    <div class="info-produto">
        <div class="descricao-produtos">

            <div class="img">
            <img class="img-produto" src="img/remedio.jpg" alt="Descrição da imagem">
            </div>
            <div class="desc">
            <h2 class="title-produto">Nome do Produto</h2>
            <p class="descricao">Descrição do produto</p>
            </div>

        </div>

        <button class="excluir">Excluir</button>
        <div class="preco">R$ 99,90</div>
        <div class="quantidade">Quantidade: 1</div>
       
    </div>

    <div class="finalizar">
        <div class="total">Total: R$ 99,90</div>
        <button class="finalizar-compra">Finalizar Compra</button>
        <button class="limpar-carrinho">Limpar Carrinho</button>
    </div>
</div>
        </section>
    </main>

    
</body>
</html>
